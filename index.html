<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Building Viewer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #viewer { width: 100%; height: 100vh; }

    #controls {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 370px;
    }

    .panel {
      background: rgba(13, 27, 42, 0.95);
      border: 1px solid #4a6a8a;
      border-radius: 8px;
      padding: 12px;
    }

    .panel-title {
      color: white;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 500;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a3a4a;
    }

    .tab-row {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    .tab {
      flex: 1;
      padding: 6px 4px;
      background: #0d1b2a;
      color: #6a9ab0;
      border: 1px solid #4a6a8a;
      border-radius: 5px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      font-family: sans-serif;
      transition: all 0.15s;
    }

    .tab.active {
      background: #1a4a6a;
      color: white;
      border-color: #4a9aba;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    label {
      display: block;
      color: #aac8e0;
      font-size: 11px;
      font-family: sans-serif;
      margin-bottom: 3px;
      margin-top: 8px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 7px 10px;
      border-radius: 5px;
      border: 1px solid #4a6a8a;
      background: #0d1b2a;
      color: white;
      font-size: 12px;
      font-family: monospace;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6a9ab0;
    }

    .coord-row {
      display: flex;
      gap: 8px;
    }

    .coord-row > div { flex: 1; }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #1a4a6a;
      color: white;
      border: 1px solid #4a9aba;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      font-family: sans-serif;
      transition: background 0.15s;
    }

    .btn:hover { background: #2a5a7a; }
    .btn:disabled { background: #0d2a3a; color: #4a6a8a; cursor: not-allowed; }

    .btn-scene {
      background: #1a3a1a;
      color: #5dcaa5;
      border-color: #2a6a4a;
    }

    .btn-scene:hover { background: #2a4a2a; }

    .btn-nav {
      background: #1a2a3a;
      border-color: #4a6a8a;
    }

    .btn-nav:hover { background: #2a3a4a; }

    #model-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 200px;
      overflow-y: auto;
    }

    #model-list::-webkit-scrollbar { width: 4px; }
    #model-list::-webkit-scrollbar-track { background: #0d1b2a; }
    #model-list::-webkit-scrollbar-thumb { background: #4a6a8a; border-radius: 2px; }

    .model-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      background: #0d1b2a;
      border: 1px solid #2a3a4a;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .model-item:hover { border-color: #4a9aba; }

    .model-item .model-name {
      color: white;
      font-size: 12px;
      font-family: sans-serif;
    }

    .model-item .model-status {
      font-size: 10px;
      font-family: sans-serif;
      padding: 2px 6px;
      border-radius: 8px;
    }

    .status-ready      { background: #0a2a1a; color: #5dcaa5; }
    .status-processing { background: #0a1a2a; color: #4a9aba; }
    .status-error      { background: #2a0a0a; color: #e07a7a; }
    .status-pending    { background: #1a1a0a; color: #EF9F27; }

    .lod-info {
      background: #0a2a1a;
      border: 1px solid #1a4a2a;
      border-radius: 5px;
      padding: 7px 10px;
      margin-bottom: 8px;
      font-size: 10px;
      font-family: sans-serif;
      color: #4a9a7a;
      line-height: 1.6;
    }

    #status-bar {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 999;
      background: rgba(13, 27, 42, 0.92);
      color: #aac8e0;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: sans-serif;
      border: 1px solid #4a6a8a;
      max-width: 380px;
      display: none;
    }

    #stats {
      position: absolute;
      bottom: 16px;
      right: 16px;
      z-index: 999;
      background: rgba(13, 27, 42, 0.85);
      color: #6a9ab0;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      border: 1px solid #2a3a4a;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div id="viewer"></div>

  <div id="controls">
    <div class="panel">
      <div class="panel-title">3D Building Viewer</div>

      <div class="tab-row">
        <div class="tab active" onclick="switchTab('scene', this)">Scene</div>
        <div class="tab" onclick="switchTab('models', this)">Models</div>
        <div class="tab" onclick="switchTab('glb', this)">GLB URL</div>
      </div>

      <div id="tab-scene" class="tab-content active">
        <div class="lod-info">
          Loads all ready models at once with quadtree grouping and 4 LOD levels.<br>
          LOD switching is automatic based on camera distance.
        </div>
        <button class="btn btn-scene" onclick="loadScene()">Load Entire Scene</button>
        <div id="scene-status" style="margin-top:8px;font-size:11px;font-family:sans-serif;color:#5dcaa5;display:none"></div>
      </div>

      <div id="tab-models" class="tab-content">
        <div id="model-list">
          <div style="color:#6a9ab0;font-size:11px;font-family:sans-serif;padding:8px 0">
            Loading models...
          </div>
        </div>
        <button class="btn" onclick="refreshModels()" style="margin-top:8px">
          Refresh
        </button>
      </div>

      <div id="tab-glb" class="tab-content">
        <label>GLB file URL</label>
        <input type="text" id="glb-url"
          placeholder="http://localhost:8080/models/building.glb"/>

        <div class="coord-row">
          <div>
            <label>Longitude</label>
            <input type="number" id="input-lon" placeholder="72.5714" step="any"/>
          </div>
          <div>
            <label>Latitude</label>
            <input type="number" id="input-lat" placeholder="23.0225" step="any"/>
          </div>
        </div>

        <label>Height above ground (m)</label>
        <input type="number" id="input-height" value="0" step="any"/>

        <button class="btn" onclick="loadGlbUrl()">Load Model</button>
      </div>
    </div>

    <button class="btn btn-nav" onclick="flyToScene()">Fly to Scene</button>
    <button class="btn btn-nav" onclick="viewer.camera.flyHome(1.5)">Globe Overview</button>
  </div>

  <div id="status-bar"></div>

  <div id="stats">
    Models loaded: <span id="stat-models">0</span><br>
    LOD mode: <span id="stat-lod">—</span><br>
    Tiles loaded: <span id="stat-tiles">—</span>
  </div>

  <script>
    Cesium.Ion.defaultAccessToken = undefined;
    const BASE_URL = window.location.origin;

    const viewer = new Cesium.Viewer('viewer', {
      imageryProvider: new Cesium.TileMapServiceImageryProvider({
        url: Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII')
      }),
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      animation: false,
      timeline: false,
      requestRenderMode: false
    });

    viewer.scene.globe.enableLighting = false;

    const loadedTilesets = {};
    let sceneLoaded = false;
    let sceneCenter = null;

    function setStatus(msg, isError) {
      const el = document.getElementById('status-bar');
      el.style.display = 'block';
      el.style.color = isError ? '#e07a7a' : '#aac8e0';
      el.textContent = msg;
      if (!isError) {
        clearTimeout(el._timer);
        el._timer = setTimeout(() => { el.style.display = 'none'; }, 4000);
      }
    }

    function switchTab(name, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
      if (name === 'models') refreshModels();
    }

    function updateStats() {
      const count = Object.keys(loadedTilesets).filter(name => name !== '__scene__').length
        + (loadedTilesets['__scene__'] ? 1 : 0);
      document.getElementById('stat-models').textContent = count;

      document.getElementById('stat-lod').textContent =
        count > 0 ? 'Auto (distance-based)' : '—';

      let tiles = 0;
      for (const ts of Object.values(loadedTilesets)) {
        try { tiles += ts.statistics ? ts.statistics.numberOfTilesWithContentReady : 0; }
        catch(e) {}
      }
      document.getElementById('stat-tiles').textContent = tiles > 0 ? tiles : '—';
    }

    setInterval(updateStats, 1000);

    async function loadScene() {
      setStatus('Loading scene tileset...');
      const url = `${BASE_URL}/scene/tileset.json`;

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`scene/tileset.json returned ${res.status} — run /api/rebuild/scene first`);

        const data = await res.json();

        let modelCount = 0;
        try {
          data.root.children.forEach(cell => {
            cell.children && cell.children.forEach(() => modelCount++);
          });
        } catch(e) {}

        if (loadedTilesets['__scene__']) {
          viewer.scene.primitives.remove(loadedTilesets['__scene__']);
          delete loadedTilesets['__scene__'];
        }

        clearLoadedTilesets();

        const tileset = await Cesium.Cesium3DTileset.fromUrl(url);
        viewer.scene.primitives.add(tileset);
        loadedTilesets['__scene__'] = tileset;
        sceneLoaded = true;

        try {
          const reg = data.root.boundingVolume.region;
          sceneCenter = {
            lon: (reg[0] + reg[2]) / 2 * 180 / Math.PI,
            lat: (reg[1] + reg[3]) / 2 * 180 / Math.PI
          };
        } catch(e) {}

        const sceneEl = document.getElementById('scene-status');
        sceneEl.style.display = 'block';
        sceneEl.textContent = `${modelCount || '?'} model(s) loaded`;

        setStatus(`Scene loaded — ${modelCount || '?'} model(s)`);
        await flyToScene();

      } catch(err) {
        setStatus('Error: ' + err.message, true);
        console.error(err);
      }
    }

    async function flyToScene() {
      if (loadedTilesets['__scene__']) {
        try {
          await viewer.zoomTo(
            loadedTilesets['__scene__'],
            new Cesium.HeadingPitchRange(
              Cesium.Math.toRadians(0),
              Cesium.Math.toRadians(-35),
              800
            )
          );
          return;
        } catch(e) {}
      }

      if (sceneCenter) {
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(sceneCenter.lon, sceneCenter.lat, 1200),
          orientation: {
            heading: Cesium.Math.toRadians(0),
            pitch: Cesium.Math.toRadians(-35),
            roll: 0
          },
          duration: 2
        });
        return;
      }

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(72.58, 23.025, 1500),
        orientation: {
          heading: Cesium.Math.toRadians(0),
          pitch: Cesium.Math.toRadians(-40),
          roll: 0
        },
        duration: 2
      });
    }

    async function loadSingleModel(name, tilesetUrl) {
      setStatus(`Loading ${name}...`);

      if (loadedTilesets['__scene__']) {
        viewer.scene.primitives.remove(loadedTilesets['__scene__']);
        delete loadedTilesets['__scene__'];
      }

      if (loadedTilesets[name]) {
        viewer.scene.primitives.remove(loadedTilesets[name]);
        delete loadedTilesets[name];
      }

      try {
        const tileset = await Cesium.Cesium3DTileset.fromUrl(tilesetUrl);
        viewer.scene.primitives.add(tileset);
        loadedTilesets[name] = tileset;
        setStatus(`${name} loaded`);
        await viewer.zoomTo(
          tileset,
          new Cesium.HeadingPitchRange(
            Cesium.Math.toRadians(0),
            Cesium.Math.toRadians(-30),
            200
          )
        );
      } catch(err) {
        setStatus(`Error loading ${name}: ` + err.message, true);
        console.error(err);
      }
    }

    async function loadGlbUrl() {
      const glbUrl = document.getElementById('glb-url').value.trim();
      const lon = parseFloat(document.getElementById('input-lon').value);
      const lat = parseFloat(document.getElementById('input-lat').value);
      const height = parseFloat(document.getElementById('input-height').value) || 0;

      if (!glbUrl) { setStatus('Please enter a GLB URL', true); return; }
      if (!glbUrl.startsWith('http')) { setStatus('URL must start with http://', true); return; }
      if (isNaN(lon) || isNaN(lat)) { setStatus('Please enter valid lon/lat', true); return; }

      setStatus('Step 1/3 — Sending to server...');

      try {
        const res = await fetch(`${BASE_URL}/convert`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ glb_url: glbUrl, lon, lat, height })
        });
        setStatus('Step 2/3 — Processing LOD levels...');

        const result = await res.json();
        if (!res.ok) { setStatus('Error: ' + result.error, true); return; }

        setStatus('Step 3/3 — Loading into viewer...');

        const name = result.model_name;
        const tsUrl = result.tileset_url;

        if (loadedTilesets[name]) {
          viewer.scene.primitives.remove(loadedTilesets[name]);
        }

        const tileset = await Cesium.Cesium3DTileset.fromUrl(tsUrl);
        viewer.scene.primitives.add(tileset);
        loadedTilesets[name] = tileset;

        await viewer.zoomTo(
          tileset,
          new Cesium.HeadingPitchRange(
            Cesium.Math.toRadians(0),
            Cesium.Math.toRadians(-30),
            200
          )
        );

        setStatus(`${name} loaded`);

      } catch(err) {
        setStatus('Error: ' + err.message, true);
        console.error(err);
      }
    }

    async function refreshModels() {
      const list = document.getElementById('model-list');
      try {
        const res = await fetch(`${BASE_URL}/api/models`);
        const data = await res.json();
        const models = data.models || [];

        if (models.length === 0) {
          list.innerHTML = '<div style="color:#6a9ab0;font-size:11px;font-family:sans-serif;padding:8px 0">No models configured</div>';
          return;
        }

        list.innerHTML = models.map(m => {
          const statusClass = `status-${m.status || 'pending'}`;
          const clickable = m.status === 'ready' && m.tileset_url
            ? `onclick="loadSingleModel('${m.name}', '${m.tileset_url}')"` : '';
          return `
            <div class="model-item" ${clickable}>
              <span class="model-name">${m.name}</span>
              <span class="model-status ${statusClass}">${m.status || 'pending'}</span>
            </div>`;
        }).join('');

      } catch(err) {
        list.innerHTML = '<div style="color:#e07a7a;font-size:11px;font-family:sans-serif">Could not reach server</div>';
      }
    }

    refreshModels();

    function clearLoadedTilesets() {
      for (const [name, tileset] of Object.entries(loadedTilesets)) {
        try {
          viewer.scene.primitives.remove(tileset);
        } catch (e) {}
        delete loadedTilesets[name];
      }
    }

    document.getElementById('glb-url').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadGlbUrl();
    });
  </script>
</body>
</html>

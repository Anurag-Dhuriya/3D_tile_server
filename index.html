<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Building Viewer</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #viewer { width: 100%; height: 100vh; }

    #controls {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel {
      background: rgba(26, 42, 58, 0.92);
      border: 1px solid #4a6a8a;
      border-radius: 8px;
      padding: 12px;
      width: 360px;
    }

    .panel-title {
      color: white;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 500;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a3a4a;
    }

    .tab-row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .tab {
      flex: 1;
      padding: 6px;
      background: #0d1b2a;
      color: #6a9ab0;
      border: 1px solid #4a6a8a;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .tab.active {
      background: #1a4a6a;
      color: white;
      border-color: #4a9aba;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    label {
      display: block;
      color: #aac8e0;
      font-size: 12px;
      font-family: sans-serif;
      margin-bottom: 4px;
      margin-top: 8px;
    }

    input[type="text"],
    input[type="number"],
    input[type="file"],
    select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 5px;
      border: 1px solid #4a6a8a;
      background: #0d1b2a;
      color: white;
      font-size: 13px;
      font-family: monospace;
    }

    input[type="file"] {
      font-family: sans-serif;
      font-size: 12px;
      padding: 6px;
      cursor: pointer;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #6a9ab0;
    }

    .coord-row {
      display: flex;
      gap: 8px;
    }

    .coord-row > div { flex: 1; }

    .action-btn {
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      background: #1a4a6a;
      color: white;
      border: 1px solid #4a9aba;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .action-btn:hover { background: #2a5a7a; }
    .action-btn:disabled {
      background: #0d2a3a;
      color: #4a6a8a;
      cursor: not-allowed;
    }

    .nav-btn {
      width: 360px;
      padding: 10px 18px;
      background: #1a2a3a;
      color: white;
      border: 1px solid #4a6a8a;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }

    .nav-btn:hover { background: #2a3a4a; }

    #model-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 200px;
      overflow-y: auto;
    }

    .model-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d1b2a;
      border: 1px solid #2a3a4a;
      border-radius: 5px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .model-item:hover { border-color: #4a9aba; }
    .model-item.active { border-color: #4a9aba; background: #0d2a3a; }

    .model-item-name {
      color: white;
      font-size: 13px;
      font-family: sans-serif;
    }

    .model-item-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-family: sans-serif;
    }

    .status-ready      { background: #0a3a2a; color: #5dcaa5; }
    .status-pending    { background: #3a2a0a; color: #EF9F27; }
    .status-processing { background: #0a2a3a; color: #4a9aba; }
    .status-error      { background: #3a0a0a; color: #e07a7a; }

    .refresh-btn {
      background: none;
      border: none;
      color: #4a9aba;
      font-size: 12px;
      cursor: pointer;
      padding: 0;
      font-family: sans-serif;
    }

    .refresh-btn:hover { color: white; }

    #status {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 999;
      background: rgba(26, 42, 58, 0.92);
      color: #aac8e0;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-family: sans-serif;
      border: 1px solid #4a6a8a;
      max-width: 400px;
      display: none;
    }

    #status.error   { color: #e07a7a; border-color: #6a2a2a; }
    #status.success { color: #5dcaa5; border-color: #2a6a4a; }

    .progress-bar-wrap {
      margin-top: 8px;
      background: #0d1b2a;
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #4a9aba;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .empty-msg {
      color: #4a6a8a;
      font-size: 12px;
      font-family: sans-serif;
      text-align: center;
      padding: 12px 0;
    }
  </style>
</head>
<body>

  <div id="viewer"></div>

  <div id="controls">
    <div class="panel">
      <div class="panel-title">Load 3D model</div>

      <div class="tab-row">
        <div class="tab active" id="tab-btn-models"
             onclick="switchTab('models', this)">My Models</div>
        <div class="tab" id="tab-btn-upload"
             onclick="switchTab('upload', this)">Upload OBJ</div>
        <div class="tab" id="tab-btn-url"
             onclick="switchTab('url', this)">GLB URL</div>
      </div>

      <!-- My Models tab -->
      <div id="tab-models" class="tab-content active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <span style="color:#aac8e0; font-size:12px; font-family:sans-serif;">
            Ready models from config
          </span>
          <button class="refresh-btn" onclick="loadModelList()">
            Refresh
          </button>
        </div>
        <div id="model-list">
          <div class="empty-msg">Loading models...</div>
        </div>
      </div>

      <!-- Upload OBJ tab -->
      <div id="tab-upload" class="tab-content">
        <label>OBJ file</label>
        <input type="file" id="obj-file" accept=".obj">

        <label>Source unit</label>
        <select id="scale-unit">
          <option value="m">Meters (m)</option>
          <option value="cm">Centimeters (cm)</option>
          <option value="mm">Millimeters (mm)</option>
          <option value="ft">Feet (ft)</option>
          <option value="in">Inches (in)</option>
        </select>

        <div class="coord-row">
          <div>
            <label>Longitude</label>
            <input type="number" id="upload-lon" placeholder="72.5714" step="any">
          </div>
          <div>
            <label>Latitude</label>
            <input type="number" id="upload-lat" placeholder="23.0225" step="any">
          </div>
        </div>

        <label>Height above ground (m)</label>
        <input type="number" id="upload-height" value="0" step="any">

        <button class="action-btn" id="upload-btn" onclick="uploadAndProcess()">
          Process and Load
        </button>
      </div>

      <!-- GLB URL tab -->
      <div id="tab-url" class="tab-content">
        <label>GLB file URL</label>
        <input type="text" id="glb-url"
          placeholder="http://localhost:8080/models/building.glb">

        <div class="coord-row">
          <div>
            <label>Longitude</label>
            <input type="number" id="url-lon" placeholder="72.5714" step="any">
          </div>
          <div>
            <label>Latitude</label>
            <input type="number" id="url-lat" placeholder="23.0225" step="any">
          </div>
        </div>

        <label>Height above ground (m)</label>
        <input type="number" id="url-height" value="0" step="any">

        <button class="action-btn" id="url-btn" onclick="loadFromUrl()">
          Load Model
        </button>
      </div>

    </div>

    <button class="nav-btn" onclick="goToBuilding()">Go to Building</button>
    <button class="nav-btn" onclick="goToGlobe()">Globe Overview</button>
  </div>

  <div id="status"></div>

  <script>

    Cesium.Ion.defaultAccessToken = undefined;

    const viewer = new Cesium.Viewer('viewer', {
      imageryProvider: new Cesium.TileMapServiceImageryProvider({
        url: Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII')
      }),
      baseLayerPicker:      false,
      geocoder:             false,
      homeButton:           false,
      sceneModePicker:      false,
      navigationHelpButton: false,
      animation:            false,
      timeline:             false,
      requestRenderMode:    false
    });

    viewer.scene.globe.enableLighting = false;

    let currentModel    = null;
    let loadedModelName = null;

    // ---- Tab switching ----
    function switchTab(name, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      el.classList.add('active');
      if (name === 'models') loadModelList();
    }

    // ---- Status bar ----
    function setStatus(msg, type, progress) {
      const el = document.getElementById('status');
      el.style.display = 'block';
      el.className = type || '';
      el.innerHTML = msg;
      if (progress !== undefined) {
        el.innerHTML += `
          <div class="progress-bar-wrap">
            <div class="progress-bar" style="width:${progress}%"></div>
          </div>`;
      }
    }

    function hideStatus() {
      setTimeout(() => {
        document.getElementById('status').style.display = 'none';
      }, 3000);
    }

    // ---- Navigation ----
    function goToBuilding() {
      if (!currentModel) {
        setStatus('No model loaded yet', 'error');
        return;
      }
      viewer.zoomTo(currentModel, new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(0),
        Cesium.Math.toRadians(-30),
        100
      ));
    }

    function goToGlobe() {
      viewer.camera.flyHome(1.5);
    }

    // ---- Clear current model ----
    function clearCurrentModel() {
      if (currentModel) {
        viewer.scene.primitives.remove(currentModel);
        currentModel    = null;
        loadedModelName = null;
      }
      document.querySelectorAll('.model-item').forEach(
        el => el.classList.remove('active')
      );
    }

    // ---- Load tileset into viewer ----
    async function loadTileset(tilesetUrl, modelName) {
      setStatus('Loading into viewer...', '', 80);

      currentModel = await Cesium.Cesium3DTileset.fromUrl(tilesetUrl);
      viewer.scene.primitives.add(currentModel);

      await viewer.zoomTo(currentModel, new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(0),
        Cesium.Math.toRadians(-30),
        100
      ));

      loadedModelName = modelName;
    }

    // ---- Load model list from API ----
    async function loadModelList() {
      const listEl = document.getElementById('model-list');
      listEl.innerHTML = '<div class="empty-msg">Loading...</div>';

      try {
        const res    = await fetch('http://localhost:8080/api/models');
        const data   = await res.json();
        const models = data.models || [];

        if (models.length === 0) {
          listEl.innerHTML = '<div class="empty-msg">No models in config.json yet</div>';
          return;
        }

        listEl.innerHTML = '';

        models.forEach(model => {
          const item = document.createElement('div');
          item.className = 'model-item' +
            (model.name === loadedModelName ? ' active' : '');
          item.id = 'model-item-' + model.name;

          item.innerHTML = `
            <span class="model-item-name">${model.name}</span>
            <span class="model-item-status status-${model.status}">
              ${model.status}
            </span>`;

          if (model.status === 'ready' && model.tileset_url) {
            item.onclick = () => loadModelFromList(model);
          } else {
            item.style.opacity = '0.5';
            item.style.cursor  = 'default';
            item.title = model.status === 'processing'
              ? 'Still processing — refresh in a moment'
              : model.status === 'error'
              ? 'Error: ' + (model.error || 'unknown')
              : 'Not yet processed';
          }

          listEl.appendChild(item);
        });

      } catch (err) {
        listEl.innerHTML = '<div class="empty-msg">Could not load models</div>';
        console.error(err);
      }
    }

    // ---- Load model from list ----
    async function loadModelFromList(model) {
      clearCurrentModel();
      setStatus(`Loading ${model.name}...`, '', 50);

      try {
        await loadTileset(model.tileset_url, model.name);

        // Highlight active item in list
        document.querySelectorAll('.model-item').forEach(
          el => el.classList.remove('active')
        );
        const item = document.getElementById('model-item-' + model.name);
        if (item) item.classList.add('active');

        setStatus(`Loaded: ${model.name}`, 'success');
        hideStatus();

      } catch (err) {
        setStatus('Error loading model: ' + err.message, 'error');
        console.error(err);
      }
    }

    // ---- Upload OBJ flow ----
    async function uploadAndProcess() {
      const fileInput = document.getElementById('obj-file');
      const lon       = parseFloat(document.getElementById('upload-lon').value);
      const lat       = parseFloat(document.getElementById('upload-lat').value);
      const height    = parseFloat(document.getElementById('upload-height').value) || 0;
      const unit      = document.getElementById('scale-unit').value;

      if (!fileInput.files.length) {
        setStatus('Please select an OBJ file', 'error');
        return;
      }
      if (isNaN(lon) || isNaN(lat)) {
        setStatus('Please enter valid longitude and latitude', 'error');
        return;
      }

      clearCurrentModel();

      const file = fileInput.files[0];
      const btn  = document.getElementById('upload-btn');
      btn.disabled = true;

      try {
        setStatus('Step 1/3 — Uploading OBJ file...', '', 10);

        const formData = new FormData();
        formData.append('obj_file', file);
        formData.append('obj_filename', file.name);
        formData.append('scale_unit', unit);
        formData.append('lon', lon);
        formData.append('lat', lat);
        formData.append('height', height);

        setStatus('Step 2/3 — Blender processing...', '', 40);

        const res    = await fetch('http://localhost:8080/upload', {
          method: 'POST',
          body:   formData
        });
        const result = await res.json();

        if (!res.ok) {
          setStatus('Error: ' + result.error, 'error');
          return;
        }

        await loadTileset(result.tileset_url, result.model_name);

        setStatus(`Loaded: ${result.model_name}`, 'success');
        hideStatus();

        // Refresh model list
        if (document.getElementById('tab-models').classList.contains('active')) {
          loadModelList();
        }

      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    // ---- Load GLB URL flow ----
    async function loadFromUrl() {
      const glbUrl = document.getElementById('glb-url').value.trim();
      const lon    = parseFloat(document.getElementById('url-lon').value);
      const lat    = parseFloat(document.getElementById('url-lat').value);
      const height = parseFloat(document.getElementById('url-height').value) || 0;

      if (!glbUrl) {
        setStatus('Please enter a GLB URL', 'error');
        return;
      }
      if (!glbUrl.startsWith('http')) {
        setStatus('URL must start with http://', 'error');
        return;
      }
      if (isNaN(lon) || isNaN(lat)) {
        setStatus('Please enter valid coordinates', 'error');
        return;
      }

      clearCurrentModel();

      const btn = document.getElementById('url-btn');
      btn.disabled = true;

      try {
        setStatus('Step 1/3 — Finding model...', '', 20);

        const res = await fetch('http://localhost:8080/convert', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ glb_url: glbUrl, lon, lat, height })
        });

        setStatus('Step 2/3 — Converting to 3D tiles...', '', 60);

        const result = await res.json();
        if (!res.ok) {
          setStatus('Error: ' + result.error, 'error');
          return;
        }

        await loadTileset(result.tileset_url, result.model_name);

        setStatus(`Loaded: ${result.model_name}`, 'success');
        hideStatus();

        if (document.getElementById('tab-models').classList.contains('active')) {
          loadModelList();
        }

      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    // ---- Load model list on startup ----
    loadModelList();

  </script>
</body>
</html>
